name: Build engsel — APK arm_cortex-a7_neon-vfpv4 (ipq40xx)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk-ipq40xx:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build package via OpenWrt SDK
        id: build
        uses: openwrt/gh-action-sdk@v7
        env:
          ARCH: arm_cortex-a7_neon-vfpv4-25.12.1
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          # IGNORE_ERRORS dihapus agar build gagal terlihat

      - name: Upload build logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            logs/
            openwrt/logs/
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: engsel-${{ env.ARCH }}
          path: |
            openwrt/bin/packages/**/engsel_*.apk
            openwrt/bin/targets/**/engsel_*.apk
          if-no-files-found: warn
