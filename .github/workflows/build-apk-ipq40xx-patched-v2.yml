name: Build engsel — APK arm_cortex-a7_neon-vfpv4 (ipq40xx)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-apk-ipq40xx:
    name: APK arm_cortex-a7_neon-vfpv4 (OpenWrt 25.12.1 / ipq40xx)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # PATCH: Inject PKG_SOURCE_PROTO ke Makefile agar SDK 25.12.1
      # bisa membuat sentinel .prepared_*_check (fix check-compile).
      # Menggunakan sed untuk insert setelah baris PKG_BUILD_DIR
      # sehingga indentasi tab tidak rusak.
      # ---------------------------------------------------------------
      - name: Patch package/engsel/Makefile untuk SDK 25.12.1
        run: |
          # Cek apakah patch sudah ada (idempotent)
          if grep -q "PKG_SOURCE_PROTO" package/engsel/Makefile; then
            echo "Makefile sudah dipatch, skip."
          else
            sed -i '/^PKG_BUILD_DIR/i PKG_SOURCE_PROTO:=none\nPKG_SOURCE_URL:=.\nPKG_SOURCE_VERSION:=HEAD\n' \
              package/engsel/Makefile
            echo "Patch berhasil diterapkan."
          fi
          echo "=== Makefile setelah patch ==="
          cat package/engsel/Makefile

      - name: Build via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: arm_cortex-a7_neon-vfpv4-25.12.1
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1

      # ---------------------------------------------------------------
      # DEBUG: Selalu tampilkan hasil build, bahkan saat gagal
      # ---------------------------------------------------------------
      - name: Debug - Tampilkan semua hasil build
        if: always()
        run: |
          echo "=== Seluruh isi bin/ ==="
          find bin/ -type f 2>/dev/null || echo "bin/ tidak ada"
          echo ""
          echo "=== Semua file .apk ==="
          find . -name "*.apk" 2>/dev/null || echo "Tidak ada .apk"
          echo ""
          echo "=== Semua file .ipk ==="
          find . -name "*.ipk" 2>/dev/null || echo "Tidak ada .ipk"
          echo ""
          echo "=== Struktur direktori bin/ ==="
          find bin/ -type d 2>/dev/null || echo "bin/ tidak ada"

      # ---------------------------------------------------------------
      # Upload dengan dua variasi path (underscore dan plus) karena
      # SDK kadang pakai arm_cortex-a7+neon-vfpv4 atau _neon-vfpv4
      # ---------------------------------------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engsel-arm_cortex-a7_neon-vfpv4-openwrt25
          path: |
            bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
            bin/packages/arm_cortex-a7+neon-vfpv4/*/engsel_*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
            bin/packages/arm_cortex-a7+neon-vfpv4/*/engsel_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-ipq40xx
          path: logs/
          retention-days: 7
