name: Build engsel — IPK arm_cortex-a7_neon-vfpv4

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-ipk-arm-cortex-a7:
    name: IPK arm_cortex-a7_neon-vfpv4 (OpenWrt 24.10)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: arm_cortex-a7_neon-vfpv4-24.10.0
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1

      - name: Tampilkan hasil build
        run: |
          echo "=== Isi bin/ ==="
          find bin/ -type f 2>/dev/null || echo "bin/ tidak ada"

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: engsel-arm_cortex-a7_neon-vfpv4-openwrt24
          path: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.ipk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && (success() || failure())
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-arm-cortex-a7
          path: logs/
          retention-days: 7
