name: Build engsel — APK arm_cortex-a7_neon-vfpv4 (ipq40xx)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk-ipq40xx:
    name: APK arm_cortex-a7_neon-vfpv4 (OpenWrt 25.12.1 / ipq40xx)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      # AUTO-COMPUTE PKG_SOURCE_VERSION + PKG_MIRROR_HASH
      #
      # Masalah sebelumnya:
      #   - HEAD → hash berubah tiap commit → build gagal
      #   - PKG_MIRROR_HASH:=skip → deprecated di SDK 25.12.1 → gagal
      #
      # Solusi permanen:
      #   1. Ambil commit SHA saat ini (bukan HEAD string)
      #   2. Clone repo + buat tarball persis seperti yang dilakukan SDK
      #   3. Hitung SHA256 dari tarball tersebut
      #   4. Inject commit SHA + hash ke Makefile secara otomatis
      #
      # Dengan ini, setiap push commit baru akan otomatis pakai
      # hash yang benar tanpa perlu edit Makefile manual.
      # ---------------------------------------------------------------
      - name: Auto-compute PKG_SOURCE_VERSION dan PKG_MIRROR_HASH
        env:
          REPO_URL: https://github.com/${{ github.repository }}.git
          COMMIT_SHA: ${{ github.sha }}
        run: |
          echo "Commit SHA: $COMMIT_SHA"
          echo "Repo URL: $REPO_URL"

          # Buat tarball persis seperti cara SDK OpenWrt membuat tarball git
          mkdir -p /tmp/dl_work
          cd /tmp/dl_work

          echo "Cloning repo..."
          git clone "$REPO_URL" engsel-1.0.0
          cd engsel-1.0.0
          git checkout "$COMMIT_SHA"

          # Ambil timestamp commit untuk reproducible tarball
          TAR_TIMESTAMP=$(git log -1 --no-show-signature --format='@%ct')
          echo "TAR_TIMESTAMP: $TAR_TIMESTAMP"

          # Buat git archive (sama persis dengan SDK)
          git config core.abbrev 8
          git archive --format=tar HEAD --output=../engsel-1.0.0.tar.git
          tar --numeric-owner --owner=0 --group=0 --ignore-failed-read \
            -C engsel-1.0.0 -f ../engsel-1.0.0.tar.git -r .git .gitmodules 2>/dev/null || true

          cd /tmp/dl_work
          rm -rf engsel-1.0.0
          mkdir engsel-1.0.0
          tar -C engsel-1.0.0 -xf engsel-1.0.0.tar.git
          cd engsel-1.0.0
          rm -rf .git .gitmodules

          # Pack menjadi .tar.zst persis seperti SDK
          cd /tmp/dl_work
          tar --numeric-owner --owner=0 --group=0 --mode=a-s --sort=name \
            --mtime="$TAR_TIMESTAMP" \
            -c engsel-1.0.0 | zstd -T0 --ultra -20 -c > engsel-1.0.0.tar.zst

          # Hitung SHA256
          COMPUTED_HASH=$(sha256sum engsel-1.0.0.tar.zst | cut -d' ' -f1)
          echo "Computed hash: $COMPUTED_HASH"

          # Inject ke Makefile
          cd $GITHUB_WORKSPACE
          sed -i "s|^PKG_SOURCE_VERSION:=.*|PKG_SOURCE_VERSION:=$COMMIT_SHA|" \
            package/engsel/Makefile
          sed -i "s|^PKG_MIRROR_HASH:=.*|PKG_MIRROR_HASH:=$COMPUTED_HASH|" \
            package/engsel/Makefile

          echo "=== Makefile setelah patch ==="
          grep -E "PKG_SOURCE|PKG_MIRROR" package/engsel/Makefile

      - name: Build via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: arm_cortex-a7_neon-vfpv4-25.12.1
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1

      - name: Tampilkan hasil build
        if: always()
        run: |
          echo "=== Semua file .apk ==="
          find bin/ -name "*.apk" 2>/dev/null || echo "Tidak ada .apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engsel-arm_cortex-a7_neon-vfpv4-openwrt25
          path: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-ipq40xx
          path: logs/
          retention-days: 7
