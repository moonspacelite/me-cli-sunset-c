name: Build engsel — APK arm_cortex-a7_neon-vfpv4 (ipq40xx)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-apk-ipq40xx:
    name: APK arm_cortex-a7_neon-vfpv4 (OpenWrt 25.12.1 / ipq40xx)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        env:
          # Format: <arch>-<openwrt_version>
          # ipq40xx generic → arm_cortex-a7_neon-vfpv4
          ARCH: arm_cortex-a7_neon-vfpv4-25.12.1
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1

      - name: Tampilkan hasil build
        run: |
          echo "=== Isi bin/ ==="
          find bin/ -type f 2>/dev/null || echo "bin/ tidak ada"
          echo ""
          echo "=== Cari file .apk ==="
          find bin/ -name "*.apk" 2>/dev/null || echo "Tidak ada .apk ditemukan"

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: engsel-arm_cortex-a7_neon-vfpv4-openwrt25
          path: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && (success() || failure())
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-ipq40xx
          path: logs/
          retention-days: 7
