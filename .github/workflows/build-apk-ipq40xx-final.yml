name: Build engsel — APK arm_cortex-a7_neon-vfpv4 (ipq40xx)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-apk-ipq40xx:
    name: APK arm_cortex-a7_neon-vfpv4 (OpenWrt 25.12.1 / ipq40xx)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ---------------------------------------------------------------
      # PATCH MAKEFILE — Fix SDK 25.12.1
      #
      # Root cause yang sudah dikonfirmasi dari log:
      #   - Tanpa PKG_SOURCE_PROTO → sentinel .prepared_*_check hilang
      #   - PKG_SOURCE_PROTO:=none → SDK coba download tarball → gagal
      #
      # Fix final: PKG_SOURCE_PROTO:=git ke repo ini sendiri.
      # SDK akan git-clone untuk membuat sentinel, lalu Build/Prepare
      # di-override untuk tetap pakai source lokal (./src/).
      # PKG_SOURCE_VERSION pakai GITHUB_SHA (commit hash saat ini).
      # ---------------------------------------------------------------
      - name: Patch package/engsel/Makefile untuk SDK 25.12.1
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          COMMIT_SHA="${GITHUB_SHA}"
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"

          python3 - << PYEOF
          import re

          makefile_content = f"""# SPDX-License-Identifier: GPL-2.0-or-later
include \$(TOPDIR)/rules.mk

PKG_NAME:=engsel
PKG_VERSION:=1.0.0
PKG_RELEASE:=1

# Fix SDK 25.12.1: PKG_SOURCE_PROTO:=git diperlukan agar
# sentinel .prepared_*_check terbentuk. SDK akan fetch repo ini
# untuk verifikasi, tapi Build/Prepare tetap pakai src lokal.
PKG_SOURCE_PROTO:=git
PKG_SOURCE_URL:={REPO_URL}
PKG_SOURCE_VERSION:={COMMIT_SHA}
PKG_MIRROR_HASH:=skip

PKG_BUILD_DIR:=\$(BUILD_DIR)/\$(PKG_NAME)-\$(PKG_VERSION)
PKG_BUILD_PARALLEL:=1

include \$(INCLUDE_DIR)/package.mk

define Package/engsel
  SECTION:=utils
  CATEGORY:=Utilities
  TITLE:=engsel - XL Axiata CLI client (C port)
  URL:=https://github.com/{GITHUB_REPOSITORY}
  MAINTAINER:=Rofiq
  DEPENDS:=+libcurl +libopenssl +libpthread
endef

define Package/engsel/description
  CLI client untuk XL Axiata (me-cli-sunset porting ke C).
  Jalankan dengan mengetik "engsel" di terminal.
  Data konfigurasi disimpan di /etc/engsel/
endef

# Override: buang hasil git clone, pakai src lokal
define Build/Prepare
\tmkdir -p \$(PKG_BUILD_DIR)
\trm -rf \$(PKG_BUILD_DIR)/*
\t\$(CP) ./src/. \$(PKG_BUILD_DIR)/
endef

define Build/Compile
\t\$(MAKE) -C \$(PKG_BUILD_DIR) \\
\t\tCC="\$(TARGET_CC)" \\
\t\tCFLAGS="\$(TARGET_CFLAGS) -I\$(PKG_BUILD_DIR)/include" \\
\t\tLDFLAGS="\$(TARGET_LDFLAGS) -lssl -lcrypto -lcurl -lm -lpthread"
endef

define Package/engsel/install
\t\$(INSTALL_DIR) \$(1)/usr/bin
\t\$(INSTALL_BIN) \$(PKG_BUILD_DIR)/engsel \$(1)/usr/bin/engsel

\t\$(INSTALL_DIR) \$(1)/etc/engsel
\t\$(INSTALL_DATA) ./files/etc/engsel/.env \$(1)/etc/engsel/.env
\t\$(INSTALL_DATA) ./files/etc/engsel/refresh-tokens.json \$(1)/etc/engsel/refresh-tokens.json
\t\$(INSTALL_DATA) ./files/etc/engsel/bookmark.json \$(1)/etc/engsel/bookmark.json

\t\$(INSTALL_DIR) \$(1)/etc/engsel/hot_data
\t\$(INSTALL_DATA) ./files/etc/engsel/hot_data/hot.json \$(1)/etc/engsel/hot_data/hot.json

\t\$(INSTALL_DIR) \$(1)/etc/engsel/decoy_data
\t\$(INSTALL_DATA) ./files/etc/engsel/decoy_data/decoy-prabayar-balance.json \$(1)/etc/engsel/decoy_data/decoy-prabayar-balance.json
\t\$(INSTALL_DATA) ./files/etc/engsel/decoy_data/decoy-prio-balance.json \$(1)/etc/engsel/decoy_data/decoy-prio-balance.json
\t\$(INSTALL_DATA) ./files/etc/engsel/decoy_data/decoy-priohybrid-balance.json \$(1)/etc/engsel/decoy_data/decoy-priohybrid-balance.json
endef

define Package/engsel/conffiles
/etc/engsel/.env
/etc/engsel/refresh-tokens.json
/etc/engsel/bookmark.json
endef

\$(eval \$(call BuildPackage,engsel))
"""
          with open("package/engsel/Makefile", "w") as f:
              f.write(makefile_content)
          print("Makefile berhasil ditulis.")
          PYEOF

          echo "=== Isi Makefile hasil patch ==="
          cat package/engsel/Makefile

      - name: Build via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: arm_cortex-a7_neon-vfpv4-25.12.1
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1

      - name: Debug - Tampilkan semua hasil build
        if: always()
        run: |
          echo "=== Seluruh isi bin/ ==="
          find bin/ -type f 2>/dev/null || echo "bin/ tidak ada"
          echo ""
          echo "=== Semua file .apk ==="
          find . -name "*.apk" 2>/dev/null || echo "Tidak ada .apk"

      # Path dikonfirmasi dari log sebelumnya:
      # bin/packages/arm_cortex-a7_neon-vfpv4/action/engsel-1.0.0-r1.apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engsel-arm_cortex-a7_neon-vfpv4-openwrt25
          path: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-ipq40xx
          path: logs/
          retention-days: 7
