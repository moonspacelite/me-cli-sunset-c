name: Build for OpenWrt ARM Cortex-A7 (.apk)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install zig dan tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget make perl tar gzip

          cd /tmp
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          echo "/tmp/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      - name: Buat zig wrapper scripts
        run: |
          cat > /tmp/zigcc << 'EOF'
          #!/bin/sh
          exec zig cc -target arm-linux-musleabihf -mcpu=cortex_a7 "$@"
          EOF

          cat > /tmp/zigar << 'EOF'
          #!/bin/sh
          exec zig ar "$@"
          EOF

          cat > /tmp/zigranlib << 'EOF'
          #!/bin/sh
          exec zig ranlib "$@"
          EOF

          chmod +x /tmp/zigcc /tmp/zigar /tmp/zigranlib

          echo 'int main(){return 0;}' > /tmp/test.c
          /tmp/zigcc /tmp/test.c -o /tmp/test_arm
          file /tmp/test_arm
          echo "Zig wrapper OK"

      - name: Build OpenSSL static for ARM musl
        run: |
          PREFIX=/tmp/arm-sysroot
          mkdir -p $PREFIX

          cd /tmp
          wget -q https://github.com/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz
          tar -xzf openssl-3.3.2.tar.gz
          cd openssl-3.3.2

          CC=/tmp/zigcc \
          AR=/tmp/zigar \
          RANLIB=/tmp/zigranlib \
          ./Configure linux-armv4 \
            --prefix=$PREFIX \
            no-shared no-tests no-apps no-asm

          make -j$(nproc) build_libs
          make install_dev
          echo "=== OpenSSL OK ==="
          ls $PREFIX/lib/libssl.a $PREFIX/lib/libcrypto.a

      - name: Build curl static for ARM musl
        run: |
          PREFIX=/tmp/arm-sysroot

          cd /tmp
          wget -q https://curl.se/download/curl-8.10.1.tar.gz
          tar -xzf curl-8.10.1.tar.gz
          cd curl-8.10.1

          ./configure \
            --host=arm-linux-gnueabihf \
            --prefix=$PREFIX \
            CC="/tmp/zigcc" \
            AR="/tmp/zigar" \
            RANLIB="/tmp/zigranlib" \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            LIBS="-lssl -lcrypto -ldl -lpthread" \
            --with-openssl=$PREFIX \
            --disable-shared --enable-static \
            --disable-ldap --disable-ldaps \
            --disable-rtsp --disable-dict \
            --disable-telnet --disable-tftp \
            --disable-pop3 --disable-imap \
            --disable-smb --disable-smtp \
            --disable-gopher --disable-mqtt \
            --without-libidn2 --without-librtmp \
            --without-libpsl \
            --disable-docs --disable-manual

          make -j$(nproc)
          make install
          echo "=== curl OK ==="
          ls $PREFIX/lib/libcurl.a

      - name: Compile engsel (me_cli)
        run: |
          PREFIX=/tmp/arm-sysroot
          SRC=$(find src -name "*.c" | tr '\n' ' ')

          /tmp/zigcc \
            -Os \
            -I./include \
            -I${PREFIX}/include \
            -Wno-unused-result \
            -Wno-misleading-indentation \
            ${SRC} \
            -o engsel \
            -L${PREFIX}/lib \
            -lcurl -lssl -lcrypto -lm -lpthread -ldl

          echo "=== Binary ==="
          file engsel
          ls -lh engsel

      # =========================================================
      # Buat OpenWrt APK v3 package untuk arm_cortex-a7
      # Format: tar.gz berisi .PKGINFO + usr/bin/engsel
      # Install: apk add --allow-untrusted /tmp/engsel.apk
      # =========================================================
      - name: Package sebagai OpenWrt .apk (arm_cortex-a7)
        run: |
          PKG_NAME="engsel"
          PKG_VER="1.0.0"
          PKG_ARCH="arm_cortex-a7"
          PKG_DESC="CLI client for XL Axiata (me-cli-sunset port to C)"
          PKG_URL="https://github.com/${{ github.repository }}"
          BUILD_DATE=$(date +%s)
          INSTALL_SIZE=$(stat -c%s engsel)

          # Buat struktur direktori package
          mkdir -p /tmp/apkbuild/usr/bin
          cp engsel /tmp/apkbuild/usr/bin/engsel
          chmod 755 /tmp/apkbuild/usr/bin/engsel

          # Buat .PKGINFO (format APK v2/v3 yang kompatibel dengan OpenWrt 25.x)
          cat > /tmp/apkbuild/.PKGINFO << EOF
          pkgname = ${PKG_NAME}
          pkgver = ${PKG_VER}-r0
          arch = ${PKG_ARCH}
          size = ${INSTALL_SIZE}
          pkgdesc = ${PKG_DESC}
          url = ${PKG_URL}
          builddate = ${BUILD_DATE}
          packager = GitHub Actions
          EOF

          # Buat post-install script (opsional, untuk info setelah install)
          cat > /tmp/apkbuild/.post-install << 'EOF'
          #!/bin/sh
          echo "[engsel] Installed to /usr/bin/engsel"
          echo "[engsel] Jalankan: cd /root && engsel"
          echo "[engsel] Pastikan file .env ada di direktori kerja!"
          EOF
          chmod +x /tmp/apkbuild/.post-install

          # Build tar.gz dalam format APK
          # APK = tar.gz dengan file-file dimulai dari root
          cd /tmp/apkbuild
          tar -czf /tmp/${PKG_NAME}-${PKG_VER}-${PKG_ARCH}.apk \
            .PKGINFO \
            .post-install \
            usr/

          echo "=== APK Package ==="
          ls -lh /tmp/${PKG_NAME}-${PKG_VER}-${PKG_ARCH}.apk
          # Verifikasi isi
          tar -tzf /tmp/${PKG_NAME}-${PKG_VER}-${PKG_ARCH}.apk

          # Copy ke workspace untuk artifact
          cp /tmp/${PKG_NAME}-${PKG_VER}-${PKG_ARCH}.apk .

      - name: Upload binary (raw)
        uses: actions/upload-artifact@v4
        with:
          name: engsel-binary-arm-cortex-a7
          path: engsel
          retention-days: 30

      - name: Upload OpenWrt APK package
        uses: actions/upload-artifact@v4
        with:
          name: engsel-openwrt-apk-arm_cortex-a7
          path: "*.apk"
          retention-days: 30
