name: Build for OpenWrt ARM Cortex-A7 (.apk)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install zig dan tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y wget make perl tar gzip

          cd /tmp
          wget -q https://ziglang.org/download/0.13.0/zig-linux-x86_64-0.13.0.tar.xz
          tar -xf zig-linux-x86_64-0.13.0.tar.xz
          echo "/tmp/zig-linux-x86_64-0.13.0" >> $GITHUB_PATH

      - name: Buat zig wrapper scripts
        run: |
          cat > /tmp/zigcc << 'EOF'
          #!/bin/sh
          exec zig cc -target arm-linux-musleabihf -mcpu=cortex_a7 "$@"
          EOF

          cat > /tmp/zigar << 'EOF'
          #!/bin/sh
          exec zig ar "$@"
          EOF

          cat > /tmp/zigranlib << 'EOF'
          #!/bin/sh
          exec zig ranlib "$@"
          EOF

          chmod +x /tmp/zigcc /tmp/zigar /tmp/zigranlib

          echo 'int main(){return 0;}' > /tmp/test.c
          /tmp/zigcc /tmp/test.c -o /tmp/test_arm
          file /tmp/test_arm
          echo "Zig wrapper OK"

      - name: Build OpenSSL static for ARM musl
        run: |
          PREFIX=/tmp/arm-sysroot
          mkdir -p $PREFIX

          cd /tmp
          wget -q https://github.com/openssl/openssl/releases/download/openssl-3.3.2/openssl-3.3.2.tar.gz
          tar -xzf openssl-3.3.2.tar.gz
          cd openssl-3.3.2

          CC=/tmp/zigcc \
          AR=/tmp/zigar \
          RANLIB=/tmp/zigranlib \
          ./Configure linux-armv4 \
            --prefix=$PREFIX \
            no-shared no-tests no-apps no-asm

          make -j$(nproc) build_libs
          make install_dev
          echo "=== OpenSSL OK ==="
          ls $PREFIX/lib/libssl.a $PREFIX/lib/libcrypto.a

      - name: Build curl static for ARM musl
        run: |
          PREFIX=/tmp/arm-sysroot

          cd /tmp
          wget -q https://curl.se/download/curl-8.10.1.tar.gz
          tar -xzf curl-8.10.1.tar.gz
          cd curl-8.10.1

          ./configure \
            --host=arm-linux-gnueabihf \
            --prefix=$PREFIX \
            CC="/tmp/zigcc" \
            AR="/tmp/zigar" \
            RANLIB="/tmp/zigranlib" \
            CPPFLAGS="-I$PREFIX/include" \
            LDFLAGS="-L$PREFIX/lib" \
            LIBS="-lssl -lcrypto -ldl -lpthread" \
            --with-openssl=$PREFIX \
            --disable-shared --enable-static \
            --disable-ldap --disable-ldaps \
            --disable-rtsp --disable-dict \
            --disable-telnet --disable-tftp \
            --disable-pop3 --disable-imap \
            --disable-smb --disable-smtp \
            --disable-gopher --disable-mqtt \
            --without-libidn2 --without-librtmp \
            --without-libpsl \
            --disable-docs --disable-manual

          make -j$(nproc)
          make install
          echo "=== curl OK ==="
          ls $PREFIX/lib/libcurl.a

      - name: Compile engsel
        run: |
          PREFIX=/tmp/arm-sysroot
          SRC=$(find src -name "*.c" | tr '\n' ' ')

          /tmp/zigcc \
            -Os \
            -I./include \
            -I${PREFIX}/include \
            -Wno-unused-result \
            -Wno-misleading-indentation \
            ${SRC} \
            -o engsel \
            -L${PREFIX}/lib \
            -lcurl -lssl -lcrypto -lm -lpthread -ldl

          echo "=== Binary ==="
          file engsel
          ls -lh engsel

      # =========================================================
      # Package sebagai OpenWrt APK v3 (arm_cortex-a7)
      #
      # Format APK v3 = DUAN gzip stream dikoncatenasi:
      #   Stream 1: tar.gz berisi .PKGINFO (control metadata)
      #   Stream 2: tar.gz berisi file-file paket (usr/bin/engsel)
      #
      # Bukan sekedar tar.gz biasa! OpenWrt 25.x menolak format lama.
      # Install: apk add --allow-untrusted /tmp/engsel.apk
      # =========================================================
      - name: Package sebagai OpenWrt APK v3
        run: |
          PKG_NAME="engsel"
          PKG_VER="1.0.0"
          PKG_REL="r0"
          PKG_ARCH="arm_cortex-a7"
          BUILD_DATE=$(date +%s)
          INSTALL_SIZE=$(stat -c%s engsel)
          APK_FILENAME="${PKG_NAME}-${PKG_VER}-${PKG_ARCH}.apk"

          # --- Buat Control Stream ---
          mkdir -p /tmp/ctrl
          cat > /tmp/ctrl/.PKGINFO << EOF
          pkgname = ${PKG_NAME}
          pkgver = ${PKG_VER}-${PKG_REL}
          arch = ${PKG_ARCH}
          size = ${INSTALL_SIZE}
          pkgdesc = CLI client for XL Axiata (me-cli-sunset port to C)
          url = https://github.com/${{ github.repository }}
          builddate = ${BUILD_DATE}
          packager = GitHub Actions
          EOF

          # Tar+gzip control — cd ke dalam folder agar path bersih
          cd /tmp/ctrl
          tar -czf /tmp/control.tar.gz .PKGINFO
          cd $GITHUB_WORKSPACE

          # --- Buat Data Stream ---
          mkdir -p /tmp/data/usr/bin
          cp engsel /tmp/data/usr/bin/engsel
          chmod 755 /tmp/data/usr/bin/engsel

          # Tar+gzip data — path harus usr/bin/engsel (tanpa ./)
          cd /tmp/data
          tar -czf /tmp/data.tar.gz usr/
          cd $GITHUB_WORKSPACE

          # --- Gabungkan dua stream → APK v3 ---
          cat /tmp/control.tar.gz /tmp/data.tar.gz > "${APK_FILENAME}"

          echo "=== APK v3 Package ==="
          ls -lh "${APK_FILENAME}"

          # Verifikasi dua gzip member di top-level
          CTRL_SIZE=$(stat -c%s /tmp/control.tar.gz)
          python3 -c "
          data = open('${APK_FILENAME}','rb').read()
          ctrl = $CTRL_SIZE
          s1ok = data[0]==0x1f and data[1]==0x8b
          s2ok = data[ctrl]==0x1f and data[ctrl+1]==0x8b
          print(f'Stream 1 (control) @ offset 0: {\"OK\" if s1ok else \"FAIL\"}')
          print(f'Stream 2 (data)    @ offset {ctrl}: {\"OK\" if s2ok else \"FAIL\"}')
          print('APK v3 format: OK' if s1ok and s2ok else 'APK v3 format: ERROR')
          "

      - name: Upload binary (raw)
        uses: actions/upload-artifact@v4
        with:
          name: engsel-binary-arm-cortex-a7
          path: engsel
          retention-days: 30

      - name: Upload OpenWrt APK v3 package
        uses: actions/upload-artifact@v4
        with:
          name: engsel-openwrt-apk-arm_cortex-a7
          path: engsel-1.0.0-arm_cortex-a7.apk
          retention-days: 30
