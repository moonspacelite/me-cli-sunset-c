name: Cross Compile OpenWRT ARM (EA6350)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Add armhf architecture
        run: |
          sudo dpkg --add-architecture armhf
          sudo apt-get update

      - name: Install cross-compiler dan libraries
        run: |
          sudo apt-get install -y \
            gcc-arm-linux-gnueabihf \
            libssl-dev:armhf \
            libcurl4-openssl-dev:armhf

      - name: Build
        run: |
          make \
            CC=arm-linux-gnueabihf-gcc \
            CFLAGS="-Wall -I./include" \
            LDFLAGS="-lssl -lcrypto -lcurl -lm"

      - name: Verify binary
        run: |
          file me_cli
          ls -lh me_cli

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: me_cli-openwrt-arm
          path: me_cli
          retention-days: 30
