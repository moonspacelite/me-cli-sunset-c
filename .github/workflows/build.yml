name: Build engsel — IPK aarch64_generic

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  build-ipk-aarch64:
    name: IPK aarch64_generic (OpenWrt 24.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: aarch64_generic-24.10.0
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1

      - name: Tampilkan hasil build
        run: |
          echo "=== Isi bin/ ==="
          find bin/ -type f 2>/dev/null || echo "bin/ tidak ada"

      - name: Upload IPK
        uses: actions/upload-artifact@v4
        with:
          name: engsel-aarch64_generic-openwrt24
          path: bin/packages/aarch64_generic/*/engsel_*.ipk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/aarch64_generic/*/engsel_*.ipk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-aarch64
          path: logs/
          retention-days: 7
