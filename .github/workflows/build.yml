name: Build engsel — IPK (aarch64) + APK (arm_cortex-a7)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────────────────────────────
  # JOB 1: .ipk untuk OpenWrt 24.10 — aarch64_generic
  # Install: opkg install --force-checksum /tmp/engsel_*.ipk
  # ──────────────────────────────────────────────────────────────────
  build-ipk-aarch64:
    name: IPK › aarch64_generic (OpenWrt 24.10)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build via OpenWrt SDK (gh-action-sdk)
        uses: openwrt/gh-action-sdk@v5
        env:
          # Format: <arch>-<openwrt-version>
          # SDK 24.10 → hasilkan .ipk (opkg)
          ARCH: aarch64_generic-24.10.0
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          NO_DEFAULT_FEEDS: 1
          BUILD_LOG: 1

      - name: Cari file IPK hasil build
        run: |
          echo "=== Hasil build ==="
          find bin/ -name "*.ipk" | head -20

      - name: Upload IPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: engsel-aarch64_generic-openwrt24-ipk
          path: bin/packages/aarch64_generic/*/engsel_*.ipk
          retention-days: 30

      - name: Upload build log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-aarch64
          path: logs/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # JOB 2: .apk untuk OpenWrt 25.05 — arm_cortex-a7_neon-vfpv4
  # Install: apk add --allow-untrusted /tmp/engsel-*.apk
  # ──────────────────────────────────────────────────────────────────
  build-apk-arm-cortex-a7:
    name: APK › arm_cortex-a7_neon-vfpv4 (OpenWrt 25.05)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build via OpenWrt SDK (gh-action-sdk)
        uses: openwrt/gh-action-sdk@v5
        env:
          # SDK 25.05 → hasilkan .apk (apk)
          ARCH: arm_cortex-a7_neon-vfpv4-25.05.0
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          NO_DEFAULT_FEEDS: 1
          BUILD_LOG: 1

      - name: Cari file APK hasil build
        run: |
          echo "=== Hasil build ==="
          find bin/ -name "*.apk" | head -20

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: engsel-arm_cortex-a7-openwrt25-apk
          path: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel-*.apk
          retention-days: 30

      - name: Upload build log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-arm-cortex-a7
          path: logs/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # JOB 3: Buat GitHub Release (hanya saat push tag v*)
  # ──────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-ipk-aarch64, build-apk-arm-cortex-a7]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download semua artifact
        uses: actions/download-artifact@v4
        with:
          path: release-files/

      - name: Tampilkan isi release-files
        run: find release-files/ -type f

      - name: Buat GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-files/**/*.ipk
            release-files/**/*.apk
          body: |
            ## engsel ${{ github.ref_name }}

            ### Cara Install

            **OpenWrt 24.x — aarch64_generic** (opkg):
            ```sh
            opkg install --force-checksum /tmp/engsel_*.ipk
            ```

            **OpenWrt 25.x — arm_cortex-a7_neon-vfpv4** (apk):
            ```sh
            apk add --allow-untrusted /tmp/engsel-*.apk
            ```

            Setelah install, ketik `engsel` di terminal.
