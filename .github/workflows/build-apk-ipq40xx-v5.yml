name: Build engsel — APK arm_cortex-a7_neon-vfpv4 (ipq40xx)

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-apk-ipq40xx:
    name: APK arm_cortex-a7_neon-vfpv4 (OpenWrt 25.12.1 / ipq40xx)
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install zstd
        run: sudo apt-get install -y zstd

      # ---------------------------------------------------------------
      # Buat tarball persis seperti cara SDK OpenWrt, menggunakan
      # binary zstd dari SDK itu sendiri agar hash cocok.
      # Tarball diletakkan di dl/ sehingga SDK skip download.
      # ---------------------------------------------------------------
      - name: Buat tarball source dan inject hash ke Makefile
        run: |
          COMMIT_SHA="${{ github.sha }}"
          REPO_URL="https://github.com/${{ github.repository }}.git"
          PKG_NAME="engsel"
          PKG_VERSION="1.0.0"
          SUBDIR="${PKG_NAME}-${PKG_VERSION}"
          TARBALL="${SUBDIR}.tar.zst"

          echo "=== Membuat tarball dari commit $COMMIT_SHA ==="

          mkdir -p /tmp/sdk_dl
          cd /tmp/sdk_dl

          # Clone dan checkout commit ini
          git clone "$REPO_URL" "$SUBDIR"
          cd "$SUBDIR"
          git checkout "$COMMIT_SHA"

          # Ambil timestamp commit (untuk reproducible tarball)
          TAR_TIMESTAMP=$(git log -1 --no-show-signature --format='@%ct')
          echo "Timestamp: $TAR_TIMESTAMP"

          # Buat git archive
          git config core.abbrev 8
          git archive --format=tar HEAD --output="../${SUBDIR}.tar.git"
          tar --numeric-owner --owner=0 --group=0 --ignore-failed-read \
            -C "$SUBDIR" -f "../${SUBDIR}.tar.git" -r .git .gitmodules 2>/dev/null || true

          cd /tmp/sdk_dl
          rm -rf "$SUBDIR"
          mkdir "$SUBDIR"
          tar -C "$SUBDIR" -xf "${SUBDIR}.tar.git"
          cd "$SUBDIR"
          rm -rf .git .gitmodules

          # Pack ke .tar.zst — gunakan parameter SAMA dengan SDK OpenWrt
          cd /tmp/sdk_dl
          tar --numeric-owner --owner=0 --group=0 --mode=a-s --sort=name \
            --mtime="$TAR_TIMESTAMP" \
            -c "$SUBDIR" | zstd -T0 -19 -c > "$TARBALL"

          # Hitung hash
          HASH=$(sha256sum "$TARBALL" | cut -d' ' -f1)
          echo "Hash: $HASH"
          echo "Tarball size: $(du -h $TARBALL | cut -f1)"

          # Letakkan tarball di dl/ (SDK akan menemukan dan pakai ini)
          mkdir -p "$GITHUB_WORKSPACE/dl"
          cp "$TARBALL" "$GITHUB_WORKSPACE/dl/$TARBALL"
          echo "Tarball disalin ke: $GITHUB_WORKSPACE/dl/$TARBALL"

          # Update Makefile dengan commit SHA dan hash yang benar
          cd "$GITHUB_WORKSPACE"
          sed -i "s|^PKG_SOURCE_VERSION:=.*|PKG_SOURCE_VERSION:=$COMMIT_SHA|" \
            package/engsel/Makefile
          sed -i "s|^PKG_MIRROR_HASH:=.*|PKG_MIRROR_HASH:=$HASH|" \
            package/engsel/Makefile

          echo "=== Verifikasi Makefile ==="
          grep -E "PKG_SOURCE|PKG_MIRROR" package/engsel/Makefile

      - name: Build via OpenWrt SDK
        uses: openwrt/gh-action-sdk@v5
        env:
          ARCH: arm_cortex-a7_neon-vfpv4-25.12.1
          FEED_DIR: ${{ github.workspace }}/package
          PACKAGES: engsel
          BUILD_LOG: 1
          NO_SHFMT_CHECK: 1
          IGNORE_ERRORS: 1
          # Arahkan SDK ke folder dl/ yang sudah berisi tarball kita
          DL_PATH: ${{ github.workspace }}/dl

      - name: Tampilkan hasil build
        if: always()
        run: |
          echo "=== Semua file .apk ==="
          find bin/ -name "*.apk" 2>/dev/null || echo "Tidak ada .apk"
          echo "=== Semua file .ipk ==="
          find bin/ -name "*.ipk" 2>/dev/null || echo "Tidak ada .ipk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: engsel-arm_cortex-a7_neon-vfpv4-openwrt25
          path: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload ke GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: bin/packages/arm_cortex-a7_neon-vfpv4/*/engsel_*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload log (jika gagal)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: log-ipq40xx
          path: logs/
          retention-days: 7
